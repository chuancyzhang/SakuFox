<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SakuFox 🦊 - 敏捷智能数据分析平台</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/web/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>

<body>
  <div class="app-container">
    <header class="topbar">
      <div class="logo-area">
        <i class="fa-solid fa-fox fa-lg logo-icon" style="color: #fca5a5;"></i>
        <h1 style="letter-spacing: 0.5px;">SakuFox 🦊</h1>
        <span class="badge" style="background: linear-gradient(135deg, #fecaca, #fca5a5); border: none; color: #7f1d1d;">v1.0</span>
      </div>
      <div class="user-area">
        <div id="userInfo" class="user-info"></div>
      </div>
    </header>

    <div class="main-layout">
      <aside class="sidebar left-sidebar" id="leftSidebar">
        <div class="sidebar-header-actions">
          <button class="toggle-btn" id="toggleLeftBtn" title="折叠"><i class="fa-solid fa-angles-left"></i></button>
        </div>
        <div class="sidebar-content">
          <div class="sidebar-section">
            <div class="section-header">
              <i class="fa-solid fa-filter"></i>
              <h2>数据分析空间</h2>
              <div class="sandbox-actions" style="margin-left: auto; display: flex; gap: 8px;">
                <button id="btnNewSandbox" title="新建空间" class="icon-btn"><i class="fa-solid fa-plus"></i></button>
                <button id="btnRenameSandbox" title="重命名" class="icon-btn" disabled><i class="fa-solid fa-pen"></i></button>
                <button id="btnDeleteSandbox" title="删除" class="icon-btn" disabled><i class="fa-solid fa-trash"></i></button>
              </div>
            </div>
            <div class="select-wrapper">
              <select id="sandboxSelect" class="full-width-select" style="margin-bottom: 0;">
                <option value="" disabled selected>选择工作空间...</option>
              </select>
            </div>
          </div>

          <div class="sidebar-section flex-grow">
            <div class="section-header">
              <i class="fa-solid fa-database"></i>
              <h2>数据模型</h2>
            </div>
            <ul id="tableList" class="nav-list">
              <li class="empty-state">暂无数据表</li>
            </ul>
          </div>
            
            <div class="sidebar-section">
              <div class="section-header">
                <i class="fa-solid fa-link"></i>
                <h2>数据源管理</h2>
              </div>
              <div class="db-form-box" style="display: flex; flex-direction: column; gap: 8px;">
                <button id="openDbModalBtn" class="btn btn-primary btn-block"><i class="fa-solid fa-plus"></i> 关联外部数据库</button>
                <button id="openUploadModalBtn" class="btn btn-outline btn-block"><i class="fa-solid fa-upload"></i> 上传本地文件</button>
              </div>
            </div>
          </div>
      </aside>
      <div class="resizer" id="resizerLeft"></div>

      <main class="content-area">
        <div class="chat-container">
          <div id="cards" class="cards-stream">
            <div class="welcome-card">
              <div class="icon-wrapper">
                <i class="fa-solid fa-magnifying-glass-chart fa-3x"></i>
              </div>
              <h3>开始你的数据探索</h3>
              <p>输入分析需求，AI 将自主取数、分析、输出结论与猜想。<br />
                您可以补充业务知识、选择猜想继续迭代，越分析越深入。</p>
            </div>
          </div>
        </div>

        <div class="input-area">
          <div class="input-row">
            <div class="input-wrapper">
              <i class="fa-solid fa-wand-magic-sparkles"></i>
              <input id="questionInput" placeholder="输入分析需求，或补充业务知识（前缀 知识: ）" autocomplete="off" />
            </div>
            <button id="sendBtn" class="btn btn-primary btn-lg">发 送</button>
          </div>
        </div>
      </main>

      <div class="resizer" id="resizerRight"></div>
      <aside class="sidebar right-sidebar" id="rightSidebar">
        <div class="sidebar-header-actions">
          <button class="toggle-btn" id="toggleRightBtn" title="折叠"><i class="fa-solid fa-angles-right"></i></button>
        </div>
        <div class="sidebar-content">
          <div class="sidebar-section">
            <div class="section-header">
              <i class="fa-solid fa-floppy-disk"></i>
              <h2>沉淀技能</h2>
            </div>
            <div class="save-skill-box" style="display:flex;flex-direction:column;gap:7px;">
              <button id="proposeSkillBtn" class="btn btn-primary btn-block" style="margin-bottom:5px;"><i class="fa-solid fa-wand-magic-sparkles"></i> 将对话提炼为技能</button>
              
              <div id="skillFormFields" style="display:none; flex-direction:column; gap:7px; border-top:1px solid var(--border); padding-top:10px; margin-top:5px;">
                <input id="skillNameInput" placeholder="技能名称（必填）" />
                <textarea id="skillDescInput" rows="2" placeholder="一句话描述这个技能能做什么..." style="resize:none;border-radius:6px;border:1px solid var(--border);padding:7px 10px;font-size:13px;"></textarea>
                <input id="skillTagsInput" placeholder="标签（逗号分隔）" />
                <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">业务知识（自动从会话提取，可补充）</div>
                <textarea id="skillKnowledgeInput" rows="3" placeholder="业务规则、指标口径、字段说明..." style="resize:none;border-radius:6px;border:1px solid var(--border);padding:7px 10px;font-size:13px;"></textarea>
                <button id="saveSkillBtn" class="btn btn-outline btn-block"><i class="fa-solid fa-bookmark"></i> 保存为技能</button>
              </div>
            </div>
          </div>

          <div class="sidebar-section flex-grow">
            <div class="section-header">
              <i class="fa-solid fa-layer-group"></i>
              <h2>已沉淀技能</h2>
            </div>
            <ul id="skillList" class="nav-list">
              <li class="empty-state">暂无沉淀技能</li>
            </ul>
          <div class="sidebar-section" style="border-top: 1px solid var(--border); padding-top: 10px;">
            <div class="section-header" style="justify-content: space-between;">
              <div style="display:flex;align-items:center;gap:6px;">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <h2>历史对话</h2>
              </div>
              <button id="btnNewSession" class="icon-btn" title="新建对话"><i class="fa-solid fa-plus"></i></button>
            </div>
            <ul id="sessionList" class="nav-list" style="max-height: 280px; overflow-y: auto;">
              <li class="empty-state">暂无历史对话</li>
            </ul>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- DB Connection Modal -->
  <div id="dbModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div class="modal-content" style="background: white; border-radius: 8px; width: 500px; max-width: 90%; max-height: 90vh; display: flex; flex-direction: column;">
      <div class="modal-header" style="padding: 16px 20px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin: 0; font-size: 18px; color: #111827;">关联外部数据库</h3>
        <button id="closeDbModalBtn" style="background: none; border: none; cursor: pointer; color: #6b7280;"><i class="fa-solid fa-xmark fa-lg"></i></button>
      </div>
      <div class="modal-body" style="padding: 20px; overflow-y: auto;">
        <select id="dbTypeInput" class="full-width-select" style="margin-bottom: 12px;">
          <option value="sqlite">SQLite (DB文件)</option>
          <option value="mysql">MySQL</option>
          <option value="postgresql">PostgreSQL</option>
          <option value="oracle">Oracle</option>
          <option value="impala">Impala</option>
        </select>
        <div style="display: flex; gap: 12px; margin-bottom: 12px;">
          <input id="dbHostInput" placeholder="Host (如localhost)" style="flex: 2; border-radius: 4px; border: 1px solid #d1d5db; padding: 8px;" />
          <input id="dbPortInput" type="number" placeholder="Port (空=默认)" style="flex: 1; border-radius: 4px; border: 1px solid #d1d5db; padding: 8px;" />
        </div>
        <input id="dbNameInput" placeholder="DB Name (或sqlite路径)" style="margin-bottom: 12px; width: 100%; border-radius: 4px; border: 1px solid #d1d5db; padding: 8px;" />
        <div style="display: flex; gap: 12px; margin-bottom: 12px;">
          <input id="dbUserInput" placeholder="用户名" style="flex: 1; border-radius: 4px; border: 1px solid #d1d5db; padding: 8px;" />
          <input id="dbPassInput" type="password" placeholder="密码" style="flex: 1; border-radius: 4px; border: 1px solid #d1d5db; padding: 8px;" />
        </div>
        <div style="display: flex; gap: 12px;">
          <button id="dbTestBtn" class="btn btn-outline" style="flex: 1; padding: 8px;">测试并连接</button>
          <button id="dbRegisterBtn" class="btn btn-primary" style="flex: 2; padding: 8px; display: none;">获取数据表</button>
        </div>
        <div id="dbMsg" style="margin-top: 12px; font-size: 13px;"></div>
        
        <div id="dbTablesContainer" style="display: none; margin-top: 16px; border-top: 1px solid #e5e7eb; padding-top: 16px;">
          <strong style="font-size: 14px; color: #374151; display: block; margin-bottom: 8px;">请选择要沙盒处理的表 (最多5张)</strong>
          <div id="dbTablesList" style="max-height: 250px; overflow-y: auto; font-size: 13px; color: #4b5563; margin-bottom: 12px; border: 1px solid #d1d5db; border-radius: 4px; padding: 8px;">
            <!-- Checkboxes will be rendered here -->
          </div>
          <button id="dbSaveTablesBtn" class="btn btn-primary" style="width: 100%; padding: 8px;">确认并关闭弹窗</button>
        </div>
      </div>
    </div>
  </div>
  <!-- File Upload Modal -->
  <div id="uploadModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div class="modal-content" style="background: white; border-radius: 8px; width: 450px; max-width: 90%; max-height: 90vh; display: flex; flex-direction: column;">
      <div class="modal-header" style="padding: 16px 20px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin: 0; font-size: 18px; color: #111827;">上传本地文件</h3>
        <button id="closeUploadModalBtn" style="background: none; border: none; cursor: pointer; color: #6b7280;"><i class="fa-solid fa-xmark fa-lg"></i></button>
      </div>
      <div class="modal-body" style="padding: 20px; overflow-y: auto;">
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">选择文件 (支持多选)</label>
          <input id="uploadInput" type="file" style="width: 100%; border: 1px dashed #d1d5db; border-radius: 6px; padding: 16px; background: #f9fafb;" accept=".csv,.xls,.xlsx,.txt,.json,.md,.log" multiple />
          <p style="font-size: 12px; color: #6b7280; margin-top: 8px;">支持格式: .csv, .xls(x), .txt, .json, .md, .log<br/>文本将直接交由大模型作为背景知识理解；表格可被分析。</p>
        </div>
        <button id="uploadBtn" class="btn btn-primary" style="width: 100%; padding: 10px;">开始上传并应用</button>
      </div>
    </div>
  </div>

  <script src="/web/common.js"></script>
  <script src="/web/dashboard.js"></script>
</body>

</html>
