<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知识索引页 - SakuFox</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/web/styles.css" />
  <style>
    html, body { min-height: 100%; height: auto; overflow-x: hidden; overflow-y: auto; }
    body { background: linear-gradient(180deg, #0f172a 0%, #111827 30%, #f8fafc 30%, #f8fafc 100%); margin: 0; font-family: 'IBM Plex Sans', sans-serif; }
    .index-shell { max-width: 1400px; margin: 0 auto; padding: 28px 20px 40px; }
    .hero { color: white; margin-bottom: 22px; }
    .hero h2 { margin: 0; font-size: 36px; letter-spacing: -0.03em; }
    .hero p { max-width: 760px; color: rgba(255,255,255,0.78); }
    .overview { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; margin-bottom: 18px; }
    .stat-card { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.12); border-radius: 22px; padding: 18px; color: white; }
    .stat-card strong { display:block; margin-top:10px; font-size:28px; }
    .grid { display:grid; grid-template-columns: minmax(0,1.1fr) minmax(0,0.9fr); gap:18px; }
    .panel { background:white; border-radius:24px; box-shadow: 0 20px 50px rgba(15,23,42,0.1); border:1px solid rgba(15,23,42,0.08); }
    .panel-head { padding:18px 20px 0; }
    .panel-body { padding:18px 20px 20px; }
    .index-table-head, .index-row { display:grid; grid-template-columns: minmax(260px, 2.2fr) 120px 120px 90px minmax(170px, 1.2fr); gap:12px; align-items:start; }
    .index-table-head { padding:0 10px 12px; color:#64748b; font-size:12px; text-transform:uppercase; letter-spacing:0.06em; border-bottom:1px solid #e2e8f0; }
    .index-table-viewport { height:min(72vh, 760px); overflow:auto; }
    .index-table-body { position:relative; min-height:120px; }
    .index-row { position:absolute; left:0; right:0; padding:12px 10px; border-bottom:1px solid #e2e8f0; background:#fff; box-sizing:border-box; }
    .index-asset-title { font-weight:700; }
    .index-asset-sub { color:#64748b; margin-top:4px; font-size:12px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .badge-pill { display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:5px 10px; font-size:12px; font-weight:700; background:#e2e8f0; color:#334155; }
    .badge-pill.good { background:#dcfce7; color:#166534; }
    .badge-pill.warn { background:#fee2e2; color:#991b1b; }
    .stack { display:grid; gap:12px; }
    .search-panel { background:#fff7ed; border-radius:20px; padding:16px; }
    .search-panel input, .search-panel select { width:100%; padding:10px 12px; border-radius:12px; border:1px solid #cbd5e1; margin-top:8px; }
    .result-card, .job-card { border:1px solid #e2e8f0; border-radius:18px; padding:14px; background:#fff; }
    .mono { white-space: pre-wrap; background:#0f172a; color:#f8fafc; border-radius:16px; padding:14px; max-height:260px; overflow:auto; font-size:12px; }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
    @media (max-width: 1100px) { .overview { grid-template-columns: repeat(2, minmax(0,1fr)); } .grid { grid-template-columns:1fr; } }
    @media (max-width: 720px) { .overview { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="app-container" style="display:block;height:auto;min-height:100vh;overflow:visible;">
    <header class="topbar" style="position:sticky;top:0;z-index:100;">
      <div class="logo-area">
        <i class="fas fa-compass logo-icon" style="color:#facc15;"></i>
        <h1>Knowledge Index</h1>
      </div>
      <div class="nav-menu" style="flex:1;display:flex;align-items:center;margin-left:32px;gap:24px;">
        <a href="/dashboard" class="nav-link" style="color:#64748b;text-decoration:none;font-weight:500;">数据分析</a>
        <a href="/web/knowledge.html" class="nav-link" style="color:#64748b;text-decoration:none;font-weight:500;">知识资产</a>
        <a href="/knowledge-index" class="nav-link active" style="color:#0f172a;text-decoration:none;font-weight:700;border-bottom:2px solid #f59e0b;padding-bottom:4px;">索引页</a>
      </div>
      <div class="user-area" style="display:flex;align-items:center;gap:12px;">
        <button class="btn btn-outline btn-sm" onclick="i18n.toggle()"><i class="fas fa-language"></i> Language</button>
        <div id="userInfo" class="user-info"></div>
      </div>
    </header>

    <main class="index-shell">
      <section class="hero">
        <h2>知识索引页</h2>
        <p>这里负责整个知识资产体系的“可检索性”。你可以看到哪些资产已经切块、哪些 embedding 已建立、哪些任务失败，以及某个 query 究竟命中了哪段知识、回到了哪个完整文件。</p>
      </section>

      <section class="overview" id="overviewGrid"></section>

      <section class="grid">
        <div class="panel">
          <div class="panel-head">
            <div style="display:flex;justify-content:space-between;gap:16px;align-items:flex-end;flex-wrap:wrap;">
              <div>
                <div style="font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;">Index Assets</div>
                <h3 style="margin:8px 0 0;font-size:24px;">资产索引表</h3>
              </div>
              <div class="toolbar">
                <button id="btnRebuildAll" class="btn btn-primary"><i class="fa-solid fa-arrows-rotate"></i> 全量重建</button>
                <a class="btn btn-outline" href="/web/knowledge.html"><i class="fa-solid fa-layer-group"></i> 返回资产页</a>
              </div>
            </div>
          </div>
          <div class="panel-body">
            <div class="index-table-head">
              <div>资产</div>
              <div>类型</div>
              <div>索引状态</div>
              <div>Chunks</div>
              <div>动作</div>
            </div>
            <div id="indexAssetViewport" class="index-table-viewport">
              <div id="indexAssetBody" class="index-table-body"></div>
            </div>
          </div>
        </div>

        <div class="stack">
          <div class="panel search-panel">
            <div style="font-size:12px;color:#9a3412;text-transform:uppercase;letter-spacing:0.06em;">Search Debug</div>
            <h3 style="margin:8px 0 0;font-size:24px;color:#7c2d12;">检索调试</h3>
            <label style="display:block;margin-top:12px;font-size:13px;font-weight:600;color:#7c2d12;">工作空间</label>
            <select id="debugSandbox"></select>
            <label style="display:block;margin-top:12px;font-size:13px;font-weight:600;color:#7c2d12;">Query</label>
            <input id="debugQuery" placeholder="例如：退款口径、活动归因、excel 规则说明" />
            <div class="toolbar">
              <button id="btnDebugSearch" class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i> 调试检索</button>
            </div>
            <div id="debugResults" class="stack" style="margin-top:14px;"></div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <div style="font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;">Jobs</div>
              <h3 style="margin:8px 0 0;font-size:24px;">索引任务</h3>
            </div>
            <div class="panel-body">
              <div id="jobList" class="stack"></div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <div style="font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;">Full Content</div>
              <h3 style="margin:8px 0 0;font-size:24px;">命中原文</h3>
            </div>
            <div class="panel-body">
              <div id="fullContent" class="mono">点击检索结果中的“读取原文”后，会在这里展示对应资产的完整或分页内容。</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="/web/common.js"></script>
  <script>i18n.init();</script>
  <script src="/web/knowledge_index.js"></script>
</body>
</html>
