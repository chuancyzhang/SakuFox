<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知识资产工作台 - SakuFox</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/web/styles.css" />
  <style>
    html, body { min-height: 100%; height: auto; overflow-x: hidden; overflow-y: auto; }
    body { background: radial-gradient(circle at top, #fef3c7 0%, #fff7ed 28%, #f8fafc 100%); margin: 0; font-family: 'IBM Plex Sans', sans-serif; color: #0f172a; }
    .workbench { max-width: 1400px; margin: 0 auto; padding: 28px 20px 40px; }
    .hero { display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; margin-bottom: 24px; }
    .hero h2 { margin: 0; font-size: 34px; letter-spacing: -0.03em; }
    .hero p { margin: 8px 0 0; color: #475569; max-width: 760px; }
    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-bottom: 18px; }
    .pending-panel { margin-bottom: 18px; }
    .virtual-grid-viewport { height: min(72vh, 760px); overflow: auto; padding: 4px; border-radius: 20px; background: linear-gradient(180deg, rgba(255,255,255,0.3), rgba(248,250,252,0.72)); }
    .pending-list { position: relative; min-height: 120px; }
    .virtual-grid-item { position: absolute; box-sizing: border-box; }
    .pending-card { height: 320px; box-sizing: border-box; border: 1px solid rgba(15,23,42,0.08); border-radius: 20px; padding: 16px; background: linear-gradient(180deg, rgba(255,250,240,0.92), rgba(255,255,255,0.98)); display: flex; flex-direction: column; }
    .pending-card h4 { margin: 0; font-size: 18px; }
    .pending-card p { margin: 8px 0 0; color: #475569; font-size: 13px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; min-height: 58px; }
    .stat-card { background: rgba(255,255,255,0.84); border: 1px solid rgba(15,23,42,0.08); border-radius: 22px; padding: 18px; box-shadow: 0 20px 50px rgba(15,23,42,0.08); }
    .stat-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-value { margin-top: 12px; font-size: 30px; font-weight: 700; }
    .layout { display: grid; grid-template-columns: minmax(0, 1.2fr) minmax(360px, 0.8fr); gap: 18px; }
    .panel { background: rgba(255,255,255,0.88); border: 1px solid rgba(15,23,42,0.08); border-radius: 24px; box-shadow: 0 16px 40px rgba(15,23,42,0.08); }
    .panel-header { padding: 18px 20px 0; }
    .panel-body { padding: 18px 20px 20px; }
    .toolbar { display: flex; gap: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap; margin-top: 14px; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .tab-btn { border: none; background: #e2e8f0; color: #334155; border-radius: 999px; padding: 8px 14px; font-weight: 600; cursor: pointer; }
    .tab-btn.active { background: linear-gradient(135deg, #f97316, #ef4444); color: white; }
    .search-box { min-width: 260px; flex: 1; max-width: 320px; }
    .search-box input { width: 100%; border: 1px solid #cbd5e1; border-radius: 999px; padding: 10px 14px; background: #fff; }
    .asset-viewport { height: min(72vh, 860px); overflow: auto; padding: 4px; border-radius: 20px; background: linear-gradient(180deg, rgba(255,255,255,0.35), rgba(248,250,252,0.86)); }
    .asset-list { position: relative; min-height: 120px; }
    .asset-virtual-item { position: absolute; left: 0; right: 0; box-sizing: border-box; }
    .asset-card { height: 152px; box-sizing: border-box; border: 1px solid rgba(15,23,42,0.08); border-radius: 20px; padding: 16px; background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(248,250,252,0.98)); cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; display: flex; flex-direction: column; }
    .asset-card:hover { transform: translateY(-2px); box-shadow: 0 14px 30px rgba(15,23,42,0.08); }
    .asset-card.active { border-color: #f97316; box-shadow: 0 0 0 2px rgba(249,115,22,0.15); }
    .asset-top { display: flex; justify-content: space-between; gap: 10px; }
    .asset-title { font-size: 18px; font-weight: 700; margin: 0; }
    .asset-sub { margin: 6px 0 0; color: #64748b; font-size: 13px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 38px; }
    .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .badge-pill { border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 600; background: #f1f5f9; color: #334155; }
    .badge-pill.good { background: #dcfce7; color: #166534; }
    .badge-pill.warn { background: #fee2e2; color: #991b1b; }
    .detail-empty { display: flex; align-items: center; justify-content: center; min-height: 420px; color: #64748b; text-align: center; padding: 24px; }
    .detail-title { margin: 0; font-size: 28px; }
    .detail-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .detail-section { margin-top: 18px; padding-top: 18px; border-top: 1px solid rgba(15,23,42,0.08); }
    .detail-section h4 { margin: 0 0 10px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; }
    .detail-content { background: #f8fafc; border-radius: 18px; padding: 14px; font-size: 13px; white-space: pre-wrap; max-height: 260px; overflow: auto; }
    .mount-list { display: grid; gap: 8px; max-height: 220px; overflow: auto; }
    .mount-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 14px; background: #fff7ed; }
    .row-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .empty-state { text-align: center; padding: 40px 20px; color: #64748b; }
    @media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } .stat-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 720px) { .hero { flex-direction: column; align-items: flex-start; } .stat-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app-container" style="display:block;height:auto;min-height:100vh;overflow:visible;">
    <header class="topbar" style="position:sticky;top:0;z-index:100;">
      <div class="logo-area">
        <i class="fas fa-fox fa-lg logo-icon" style="color:#fb923c;"></i>
        <h1>Knowledge Workbench</h1>
      </div>
      <div class="nav-menu" style="flex:1;display:flex;align-items:center;margin-left:32px;gap:24px;">
        <a href="/dashboard" class="nav-link" style="color:#64748b;text-decoration:none;font-weight:500;">数据分析</a>
        <a href="/sql-toolbox" class="nav-link" style="color:#64748b;text-decoration:none;font-weight:500;">SQL 工具箱</a>
        <a href="/web/knowledge.html" class="nav-link active" style="color:#0f172a;text-decoration:none;font-weight:700;border-bottom:2px solid #f97316;padding-bottom:4px;">知识资产</a>
        <a href="/knowledge-index" class="nav-link" style="color:#64748b;text-decoration:none;font-weight:500;">索引页</a>
      </div>
      <div class="user-area" style="display:flex;align-items:center;gap:12px;">
        <button class="btn btn-outline btn-sm" onclick="i18n.toggle()"><i class="fas fa-language"></i> Language</button>
        <div id="userInfo" class="user-info"></div>
      </div>
    </header>

    <main class="workbench">
      <section class="hero">
        <div>
          <h2>知识资产工作台</h2>
          <p>统一管理企业知识、上传文件与沉淀经验。资产页强调“可读、可挂载、可检索”，索引页负责“可命中、可回溯、可重建”。</p>
        </div>
        <div class="hero-actions">
          <button id="btnCreateKb" class="btn btn-primary"><i class="fa-solid fa-plus"></i> 新建企业知识</button>
          <a class="btn btn-outline" href="/knowledge-index"><i class="fa-solid fa-compass"></i> 打开索引页</a>
          <button id="btnRefresh" class="btn btn-primary"><i class="fa-solid fa-rotate"></i> 刷新资产</button>
        </div>
      </section>

      <section class="stat-grid" id="statGrid"></section>

      <section class="panel pending-panel">
        <div class="panel-header">
          <div style="font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;">Pending Experiences</div>
          <h3 style="margin:8px 0 0;font-size:24px;">待确认经验</h3>
        </div>
        <div class="panel-body">
          <div id="pendingExperienceViewport" class="virtual-grid-viewport">
            <div id="pendingExperienceList" class="pending-list"></div>
          </div>
        </div>
      </section>

      <section class="layout">
        <div class="panel">
          <div class="panel-header">
            <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;">
              <div>
                <div style="font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;">Assets</div>
                <h3 style="margin:8px 0 0;font-size:24px;">统一知识资产池</h3>
              </div>
            </div>
            <div class="toolbar">
              <div class="tabs" id="assetTabs"></div>
              <div class="search-box"><input id="assetSearch" placeholder="搜索资产名称、来源或摘要" /></div>
            </div>
          </div>
          <div class="panel-body">
            <div id="assetListViewport" class="asset-viewport">
              <div class="asset-list" id="assetList"></div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <div style="font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;">Details</div>
            <h3 style="margin:8px 0 0;font-size:24px;">资产详情</h3>
          </div>
          <div class="panel-body" id="detailPanel">
            <div class="detail-empty">从左侧选择一个资产，查看来源、挂载关系、索引状态与完整内容。</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="/web/common.js"></script>
  <script>i18n.init();</script>
  <script src="/web/knowledge.js"></script>
</body>
</html>
